name: Auto-Discover DockerHub Organizations

on:
  schedule:
    # Run daily at 05:00 UTC — after the update (02:00) and report (03:00) workflows.
    # Processes up to 5000 programs per run; naturally stops when daily API quota
    # is exhausted and retries remaining programs on the next scheduled run.
    # All 3000+ programs will be covered even if it takes several days.
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      max_discoveries:
        description: "Max programs to auto-discover (default 100; use 2000+ for a bulk catchup run)"
        required: false
        default: "5000"

permissions:
  contents: write

# Cancel any in-progress discovery run so a manual trigger never duplicates work.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  auto-discover:
    runs-on: ubuntu-latest
    timeout-minutes: 480 # 8 hours max — enough for 5000+ programs with rate-limit sleeps

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Auto-discover DockerHub usernames
        env:
          # Comma-separated list of Gemini API keys for AI-powered discovery.
          # Add keys in repo Settings -> Secrets -> GEMINI_API_KEYS.
          # Multiple keys are rotated automatically to handle per-minute rate limits.
          # Script exits with error if this secret is not set.
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: |
          MAX="${{ github.event.inputs.max_discoveries || 5000 }}"

          # Validate input: must be a positive integer
          if [[ ! "$MAX" =~ ^[0-9]+$ ]] || [ "$MAX" -le 0 ]; then
            echo "Invalid max_discoveries value: '$MAX' — using default 100"
            MAX=100
          fi

          echo "Auto-discovering DockerHub usernames for programs marked with '?'"
          echo "Max discoveries: $MAX"
          if [ -n "${GEMINI_API_KEYS}" ]; then
            KEY_COUNT=$(echo "${GEMINI_API_KEYS}" | tr ',' '\n' | grep -c .)
            echo "Strategy: Gemini AI ($KEY_COUNT key(s)) with Google Search grounding"
          else
            echo "ERROR: GEMINI_API_KEYS secret is not set — workflow will fail"
          fi
          python3 actions/auto_discover.py "$MAX"
        continue-on-error: false

      - name: Generate statistics
        run: |
          python3 actions/generate_stats.py
        continue-on-error: true

      - name: Commit discoveries
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add all changed TSV files and stats
          git add dockerhub-orgs-data/*.tsv
          git add docs/STATISTICS.md
          git add README.md

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "✅ No new discoveries to commit"
            echo "no_changes=true" >> $GITHUB_ENV
          else
            # Count discoveries — use grep | wc -l (not grep -c) to avoid exit-code 1
            # on zero-match producing "0 0" via the old `|| echo "0"` fallback.
            discovered=$(git diff --staged dockerhub-orgs-data/*.tsv | grep "^+.*hub.docker.com" | wc -l | tr -d ' ')

            echo "📝 Committing $discovered new discoveries"
            git commit -m "Auto-discover DockerHub organizations - Found: $discovered usernames"

            # Pull any commits pushed by other workflows (e.g. report.yml at 06:00 UTC)
            # that landed while this long-running job was processing programs.
            # --rebase replays our commit on top cleanly; TSV files sort deterministically
            # so merge conflicts are extremely unlikely.
            # Stash untracked files (e.g. discovery_log.txt) so rebase doesn't abort.
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase origin main
            git stash pop 2>/dev/null || true
            git push
            echo "✅ Changes pushed successfully"
            echo "no_changes=false" >> $GITHUB_ENV
          fi

      - name: Create summary
        run: |
          echo "## 🐳 Auto-Discovery Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f discovery_log.txt ]; then
            cat discovery_log.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No discovery log generated" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Next scheduled run**: Daily 05:00 UTC" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: https://github.com/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
